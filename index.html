<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Seminářů 2026/27 | Gymnázium Slaný</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SEMINARS_DATA = [
            { "id": "B2F", "code": "B2F", "title": "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň B2", "subject": "angličtina", "group": "cizí jazyky", "years": ["3. ročník"], "isCertificate": true, "target": "Studenti, kteří chtějí získat mezinárodně uznávaný certifikát B2 First.", "warning": "Vstupní test se skládá na konci 2. ročníku.", "annotation": "Intenzivní příprava k mezinárodní zkoušce na úrovni B2." },
            { "id": "CAE", "code": "CAE", "title": "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň C1", "subject": "angličtina", "group": "cizí jazyky", "years": ["4. ročník"], "isCertificate": true, "target": "Studenti cílející na C1 Advanced.", "warning": "", "annotation": "Posuňte svou angličtinu na úroveň rodilého mluvčího." },
            { "id": "KAJ", "code": "KAJ", "title": "Konverzační seminář z anglického jazyka", "subject": "angličtina", "group": "cizí jazyky", "years": ["4. ročník"], "isCertificate": false, "target": "Studenti, kteří z AJ nematurují, ale chtějí mluvit.", "warning": "", "annotation": "Zaměřeno na živý, moderní jazyk a debaty." },
            { "id": "CM", "code": "CM", "title": "Cvičení z matematiky", "subject": "matematika", "group": "přírodní vědy", "years": ["4. ročník"], "isCertificate": false, "target": "Maturanti z matematiky.", "warning": "", "annotation": "Příprava na státní maturitní test." },
            { "id": "KNJ", "code": "KNJ", "title": "Konverzace v německém jazyce", "subject": "němčina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Maturanti z NJ i zájemci o zdokonalení.", "warning": "Seminář si lze zapsat pro 3. i 4. ročník.", "annotation": "Příprava k profilové zkoušce a rozvoj komunikace." },
            { "id": "ZD", "code": "ZD", "title": "Příprava na mezinárodní zkoušku Zertifikat Deutsch B1", "subject": "němčina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": true, "target": "Zájemci o certifikát B1.", "warning": "Seminář si lze zapsat pro 3. i 4. ročník.", "annotation": "Systematická příprava na Zertifikat Deutsch." },
            { "id": "KRP", "code": "KRP", "title": "Kreativní psaní", "subject": "český jazyk a literatura", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí žurnalisté a kreativci.", "warning": "Seminář si lze zapsat pro 3. i 4. ročník.", "annotation": "Hledání vlastního tvůrčího hlasu a stylistika." },
            { "id": "PAJ", "code": "PAJ", "title": "Přípravný seminář k maturitě z anglického jazyka", "subject": "angličtina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Studenti maturující z AJ.", "warning": "Optimální je začít již ve 3. ročníku.", "annotation": "Příprava k ústní části profilové zkoušky." },
            { "id": "SCB", "code": "SCB", "title": "Seminář a cvičení z biologie", "subject": "biologie", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí lékaři a přírodovědci.", "warning": "Doporučujeme dvouletou docházku.", "annotation": "Hlubší vhled do buněčné biologie, genetiky a evoluce." },
            { "id": "SCF", "code": "SCF", "title": "Seminář a cvičení z fyziky", "subject": "fyzika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o techniku a medicínu.", "warning": "Dvouletý cyklus je výhodou.", "annotation": "Experimentální fyzika a příprava k maturitě." },
            { "id": "SCH", "code": "SCH", "title": "Seminář a cvičení z chemie", "subject": "chemie", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí lékaři a chemici.", "warning": "Navazuje na učivo 3. ročníku.", "annotation": "Anorganická, analytická a organická chemie prakticky." },
            { "id": "SCI", "code": "SCI", "title": "Seminář a cvičení z informatiky", "subject": "informatika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o IT a programování.", "warning": "Ve 4. ročníku se zaměřujeme na Python.", "annotation": "Webové aplikace, kyberbezpečnost a programování." },
            { "id": "SCM", "code": "SCM", "title": "Seminář a cvičení z matematiky", "subject": "matematika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Studenti technických a ekonomických škol.", "warning": "Ve 4. ročníku se probírá matematická analýza.", "annotation": "Komplexní čísla, kombinatorika a integrální počet." },
            { "id": "PSY", "code": "PSY", "title": "Psychologie", "subject": "psychologie", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí psychologové a pedagogové.", "warning": "Lze zapsat i samostatně v jednom ročníku.", "annotation": "Vhled do tajů lidské psychiky a kazuistiky." },
            { "id": "SVS", "code": "SVS", "title": "Společenskovědní seminář", "subject": "občanská nauka", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí právníci a politologové.", "warning": "Obsahuje filozofii i právo.", "annotation": "Hluboká sonda do náboženství, filozofie a politologie." },
            { "id": "SVV", "code": "SVV", "title": "Seminář z výtvarné výchovy", "subject": "výtvarná vychova", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Uchazeči o architekturu a design.", "warning": "Kombinuje teorii s vlastní tvorbou.", "annotation": "Dějiny umění a rozvoj kreativního portfolia." },
            { "id": "SCZ", "code": "SCZ", "title": "Seminář a cvičení ze zeměpisu", "subject": "zeměpis", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o geografii a cestovní ruch.", "warning": "Příprava na maturitu probíhá ve 4. ročníku.", "annotation": "Regionální zeměpis a socioekonomické aspekty." },
            { "id": "KFJ", "code": "KFJ", "title": "Konverzace ve francouzském jazyce", "subject": "francouzština", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o francouzskou kulturu.", "warning": "Doporučujeme dvouletou docházku.", "annotation": "Rozvoj plynulé komunikace a reálie frankofonie." },
            { "id": "SCD", "code": "SCD", "title": "Seminář z dějepisu", "subject": "dějepis", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o historii a politologii.", "warning": "Zaměřeno na regionální i světové dějiny.", "annotation": "Kritická práce s prameny a historické souvislosti." },
            { "id": "LS", "code": "LS", "title": "Literární seminář", "subject": "český jazyk a literatura", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o hlubší poznání literatury.", "warning": "Vhodné jako příprava k ústní maturitě.", "annotation": "Četba, interpretace a diskuse o literárních dílech." }
        ];

        const App = () => {
          const [selectedSeminar, setSelectedSeminar] = useState(null);
          const [searchQuery, setSearchQuery] = useState("");
          const [yearFilter, setYearFilter] = useState("all");
          const [groupFilter, setGroupFilter] = useState("all");

          const groupedSeminars = useMemo(() => {
            const filtered = SEMINARS_DATA.filter(s => {
              const matchesSearch = s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.code.toLowerCase().includes(searchQuery.toLowerCase());
              const matchesYear = yearFilter === "all" || s.years.some(y => y.includes(yearFilter));
              const matchesGroup = groupFilter === "all" || s.group === groupFilter;
              return matchesSearch && matchesYear && matchesGroup;
            });

            const groups = filtered.reduce((acc, seminar) => {
              const subject = seminar.subject;
              if (!acc[subject]) acc[subject] = [];
              acc[subject].push(seminar);
              return acc;
            }, {});

            return Object.keys(groups).sort((a, b) => a.localeCompare(b, 'cs')).map(subject => ({
              subject,
              seminars: groups[subject].sort((a, b) => a.title.localeCompare(b.title, 'cs'))
            }));
          }, [searchQuery, yearFilter, groupFilter]);

          const filterGroups = ["all", ...new Set(SEMINARS_DATA.map(s => s.group))];

          return (
            <div className="min-h-screen text-slate-900 bg-slate-50">
              <header className="bg-white border-b sticky top-0 z-30 shadow-sm">
                <div className="max-w-6xl mx-auto px-4 py-6">
                  <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="flex items-center gap-4 text-center md:text-left">
                        <div className="hidden sm:flex w-12 h-12 bg-indigo-600 rounded-2xl items-center justify-center shadow-lg shadow-indigo-200">
                            <Icon name="graduation-cap" className="text-white w-7 h-7" />
                        </div>
                        <div>
                            <h1 className="text-2xl font-[900] tracking-tight text-slate-800 uppercase">Volba Seminářů 2026/27</h1>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-[0.2em]">Gymnázium Slaný</p>
                        </div>
                    </div>
                    
                    <div className="flex flex-wrap w-full md:w-auto gap-3">
                      <div className="relative flex-grow md:w-64">
                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" />
                        <input 
                          className="w-full pl-11 pr-4 py-3 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500/20 focus:bg-white transition-all font-semibold text-sm" 
                          placeholder="Hledat seminář..." 
                          value={searchQuery}
                          onChange={e => setSearchQuery(e.target.value)}
                        />
                      </div>
                      <select className="px-4 py-3 bg-white border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500 transition-colors cursor-pointer" value={yearFilter} onChange={e => setYearFilter(e.target.value)}>
                        <option value="all">Všechny ročníky</option>
                        <option value="3.">3. ročník</option>
                        <option value="4.">4. ročník</option>
                      </select>
                    </div>
                  </div>

                  <div className="flex overflow-x-auto gap-2 mt-8 pb-2 scrollbar-hide">
                    {filterGroups.map(g => (
                        <button 
                            key={g} 
                            onClick={() => setGroupFilter(g)} 
                            className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap border-2 ${groupFilter === g ? "bg-slate-900 text-white border-slate-900 shadow-lg shadow-slate-200" : "bg-white text-slate-500 border-slate-100 hover:border-slate-200"}`}
                        >
                            {g === "all" ? "Všechny skupiny" : g}
                        </button>
                    ))}
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-10 space-y-12">
                {groupedSeminars.length > 0 ? groupedSeminars.map(group => (
                  <section key={group.subject}>
                    <div className="flex items-center gap-4 mb-6">
                        <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">{group.subject}</h2>
                        <div className="h-px bg-slate-200 flex-grow"></div>
                        <span className="text-slate-400 font-bold text-xs">{group.seminars.length} {group.seminars.length === 1 ? 'seminář' : (group.seminars.length < 5 ? 'semináře' : 'seminářů')}</span>
                    </div>
                    <div className="subject-grid">
                        {group.seminars.map(s => (
                          <div 
                            key={s.id} 
                            onClick={() => setSelectedSeminar(s)} 
                            className="group bg-white p-6 rounded-[2rem] border border-slate-100 hover:shadow-xl hover:shadow-indigo-500/5 hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col h-full relative"
                          >
                            <div className="flex justify-between items-start mb-4">
                                <div className="flex flex-wrap gap-2">
                                    {s.isCertificate && (
                                        <span className="bg-amber-100 text-amber-600 font-black text-[10px] px-3 py-1 rounded-lg tracking-widest uppercase flex items-center gap-1">
                                            <Icon name="award" className="w-3 h-3" /> Certifikát
                                        </span>
                                    )}
                                </div>
                                <div className="flex flex-col gap-1 items-end ml-auto">
                                    {s.years.map(y => (
                                        <span key={y} className={`text-[9px] font-extrabold px-2 py-0.5 rounded-md uppercase tracking-wider border ${y.includes("3.") ? "bg-purple-50 text-purple-600 border-purple-100" : "bg-blue-50 text-blue-600 border-blue-100"}`}>
                                            {y}
                                        </span>
                                    ))}
                                </div>
                            </div>
                            
                            <h3 className="font-extrabold text-base text-slate-800 group-hover:text-indigo-600 transition-colors leading-tight mb-4 flex-grow">
                                {s.title} <span className="text-slate-400 font-semibold text-sm ml-1 uppercase tracking-wider">({s.code})</span>
                            </h3>
                            
                            <div className="pt-4 border-t border-slate-50 flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                                <span className="text-slate-400 font-bold text-[10px] uppercase tracking-wide">
                                    {s.group}
                                </span>
                            </div>
                          </div>
                        ))}
                    </div>
                  </section>
                )) : (
                  <div className="py-20 text-center">
                    <Icon name="search-x" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                    <p className="text-slate-500 font-bold">Nebyly nalezeny žádné semináře odpovídající vašim filtrům.</p>
                  </div>
                )}
              </main>

              {/* Modální okno s detailem */}
              {selectedSeminar && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setSelectedSeminar(null)}></div>
                  <div className="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="bg-slate-900 p-8 md:p-10 text-white relative shrink-0">
                      <button onClick={() => setSelectedSeminar(null)} className="absolute top-6 right-6 p-2 hover:bg-white/10 rounded-full transition-colors">
                        <Icon name="x" className="w-6 h-6" />
                      </button>
                      <div className="flex flex-col gap-2">
                        <span className="text-indigo-400 font-bold text-xs uppercase tracking-widest">{selectedSeminar.subject}</span>
                        <h2 className="text-3xl font-black leading-tight pr-10">{selectedSeminar.title}</h2>
                      </div>
                    </div>
                    <div className="p-8 md:p-10 overflow-y-auto scrollbar-hide">
                      <div className="space-y-8">
                        <div>
                          <h4 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-3 flex items-center gap-2"><Icon name="info" className="w-4 h-4" /> Anotace</h4>
                          <p className="text-slate-600 leading-relaxed font-medium whitespace-pre-line">{selectedSeminar.annotation}</p>
                        </div>
                        <div className="grid md:grid-cols-2 gap-8">
                          <div>
                            <h4 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-3">Cílová skupina</h4>
                            <p className="text-slate-600 text-sm font-semibold leading-relaxed">{selectedSeminar.target}</p>
                          </div>
                          {selectedSeminar.warning && (
                            <div>
                              <h4 className="text-xs font-black uppercase tracking-widest text-red-400 mb-3">Důležité upozornění</h4>
                              <p className="text-red-600/80 text-sm font-bold leading-relaxed whitespace-pre-line">{selectedSeminar.warning}</p>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                    <div className="p-6 bg-slate-50 border-t border-slate-100 flex justify-between items-center shrink-0">
                      <span className="text-slate-400 font-bold text-xs uppercase tracking-widest">Kód: {selectedSeminar.code}</span>
                      <button onClick={() => setSelectedSeminar(null)} className="px-6 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">Zavřít</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
