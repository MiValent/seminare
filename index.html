            const [searchQuery, setSearchQuery] = useState("");
            const [yearFilter, setYearFilter] = useState("all");
            const [groupFilter, setGroupFilter] = useState("all");

            const formUrl = "https://forms.gle/yAGSfmc9gAXMCQyF8";

            const filteredSeminars = useMemo(() => {
                return SEMINARS_DATA.filter(s => {
                    const matchesSearch = s.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        s.subject.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesYear = yearFilter === "all" || s.years.some(y => y.includes(yearFilter));
                    const matchesGroup = groupFilter === "all" || s.group === groupFilter;
                    return matchesSearch && matchesYear && matchesGroup;
                });
            }, [searchQuery, yearFilter, groupFilter]);

            const groups = useMemo(() => {
                const uniqueGroups = Array.from(new Set(SEMINARS_DATA.map(s => s.group)));
                uniqueGroups.sort((a, b) => a.localeCompare('cs', { sensitivity: 'base' }));
                return ["all", ...uniqueGroups];
            }, []);

            const subjects = useMemo(() => {
                const rawSubjects = [...new Set(filteredSeminars.map(s => s.subject))];
                return rawSubjects.sort((a, b) => {
                    const poradi = [
                        "angličtina", "biologie", "český jazyk a literatura", "dějepis",
                        "francouzština", "fyzika", "chemie", "informatika", "matematika",
                        "němčina", "psychologie", "výtvarná výchova", "základy společenských věd", "zeměpis"
                    ];
                    return poradi.indexOf(a) - poradi.indexOf(b);
                });
            }, [filteredSeminars]);

            // Vykreslování komponent bez použití JSX a Babelu
            return e('div', { className: 'min-h-screen bg-slate-50' },
                e('header', { className: 'bg-white border-b sticky top-0 z-30 shadow-sm px-4 py-6' },
                    e('div', { className: 'max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4' },
                        e('div', { className: 'flex items-center gap-4' },
                            e('div', { className: 'bg-indigo-600 p-2 rounded-xl text-white' },
                                e(Icon, { name: 'graduation-cap', className: 'w-6 h-6' })
                            ),
                            e('div', null,
                                e('h1', { className: 'text-xl font-black uppercase tracking-tight text-left' }, 'Katalog seminářů 26/27'),
                                e('p', { className: 'text-xs text-slate-500 font-bold uppercase tracking-widest text-left' }, 'Gymnázium Slaný')
                            )
                        ),
                        e('div', { className: 'flex gap-2 w-full md:w-auto' },
                            e('input', {
                                className: 'flex-grow md:w-64 px-4 py-2 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-indigo-500/20 font-medium',
                                placeholder: 'Hledat...',
                                value: searchQuery,
                                onChange: e => setSearchQuery(e.target.value)
                            }),
                            e('select', {
                                className: 'px-4 py-2 bg-white border rounded-xl font-bold text-sm',
                                value: yearFilter,
                                onChange: e => setYearFilter(e.target.value)
                            },
                                e('option', { value: 'all' }, 'Všechny ročníky'),
                                e('option', { value: '3.' }, '3. ročník'),
                                e('option', { value: '4.' }, '4. ročník')
                            )
                        )
                    )
                ),
                e('main', { className: 'max-w-6xl mx-auto px-4 py-8' },
                    e('div', { className: 'bg-indigo-900 rounded-3xl p-8 mb-12 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6' },
                        e('div', { className: 'text-center md:text-left text-white font-black uppercase' },
                            e('h3', { className: 'text-2xl mb-1' }, 'Máš už vybráno?'),
                            e('p', { className: 'text-indigo-200 text-sm tracking-wide' }, 'Přejdi k odeslání volby přes tlačítko vpravo.')
                        ),
                        e('a', { href: formUrl, target: '_blank', className: 'bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-5 rounded-2xl font-black shadow-lg transition-all hover:scale-105 flex items-center gap-3 uppercase tracking-wider' },
                            e('span', null, 'CHCI SE ZAPSAT'),
                            e(Icon, { name: 'chevron-right', className: 'w-6 h-6' })
                        )
                    ),
                    e('div', { className: 'flex overflow-x-auto gap-2 mb-10 pb-2 scrollbar-hide' },
                        groups.map(g => e('button', {
                            key: g,
                            onClick: () => setGroupFilter(g),
                            className: `px-4 py-2 rounded-full text-[10px] font-black transition-all whitespace-nowrap border-2 uppercase ${groupFilter === g ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-400 border-slate-200'}`
                        }, g === 'all' ? 'Všechny skupiny' : g))
                    ),
                    subjects.map(subject => e('div', { key: subject, className: 'mb-12' },
                        e('h2', { className: 'text-2xl font-black text-slate-800 mb-6 uppercase border-l-4 border-indigo-600 pl-4 text-left' }, subject),
                        e('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
                            filteredSeminars.filter(s => s.subject === subject).map(s => e('div', {
                                key: s.id,
                                onClick: () => setSelectedSeminar(s),
                                className: 'bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl hover:scale-[1.02] transition-all cursor-pointer flex flex-col group'
                            },
                                e('div', { className: 'flex justify-between items-start mb-4' },
                                    e('span', { className: 'bg-indigo-50 text-indigo-700 text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter' }, s.code),
                                    e('div', { className: 'flex gap-1' }, s.years.map(y => e('span', { key: y, className: 'bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-1 rounded' }, y)))
                                ),
                                e('h4', { className: 'font-bold text-lg mb-3 leading-tight group-hover:text-indigo-600 transition-colors text-left' }, s.title),
                                e('p', { className: 'text-slate-500 text-sm line-clamp-3 text-left' }, s.annotation),
                                e('div', { className: 'mt-auto pt-4 flex items-center text-indigo-500 text-[10px] font-black uppercase tracking-widest gap-2' },
                                    'Zobrazit podrobnosti ', e(Icon, { name: 'arrow-right', className: 'w-3 h-3' })
                                )
                            ))
                        )
                    ))
                ),
                selectedSeminar && e('div', { className: 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm', onClick: () => setSelectedSeminar(null) },
                    e('div', { className: 'bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl relative', onClick: e => e.stopPropagation() },
                        e('button', { onClick: () => setSelectedSeminar(null), className: 'absolute top-6 right-6 p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors' },
                            e(Icon, { name: 'x', className: 'w-5 h-5' })
                        ),
                        e('div', { className: 'p-8 md:p-12' },
                            e('div', { className: 'flex items-center gap-3 mb-6' },
                                e('span', { className: 'bg-indigo-600 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest' }, selectedSeminar.code),
                                e('span', { className: 'text-slate-400 font-bold uppercase text-xs tracking-widest' }, selectedSeminar.group)
                            ),
                            e('h2', { className: 'text-3xl font-[900] leading-tight text-slate-900 mb-6 uppercase tracking-tight text-left' }, selectedSeminar.title),
                            e('div', { className: 'space-y-6' },
                                e('div', null,
                                    e('h5', { className: 'text-[10px] font-black uppercase text-indigo-500 mb-2 tracking-widest text-left' }, 'Anotace'),
                                    e('p', { className: 'text-slate-600 leading-relaxed font-medium text-left whitespace-pre-line' }, selectedSeminar.annotation)
                                ),
                                e('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-slate-100' },
                                    e('div', null,
                                        e('h5', { className: 'text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest text-left' }, 'Pro koho je určen'),
                                        e('p', { className: 'text-sm font-bold text-slate-700 text-left' }, selectedSeminar.target)
                                    ),
                                    selectedSeminar.warning && e('div', { className: 'bg-amber-50 p-4 rounded-2xl border border-amber-100 text-left' },
                                        e('h5', { className: 'text-[10px] font-black uppercase text-amber-600 mb-1 tracking-widest flex items-center gap-2' },
                                            e(Icon, { name: 'alert-circle', className: 'w-3 h-3' }), ' Poznámka'
                                        ),
                                        e('p', { className: 'text-sm italic text-amber-900 leading-tight' }, selectedSeminar.warning)
                                    )
                                )
                            )
                        ),
                        e('div', { className: 'bg-slate-50 p-6 flex justify-center items-center border-t' },
                            e('button', { onClick: () => setSelectedSeminar(null), className: 'bg-slate-200 text-slate-600 px-8 py-3 rounded-xl font-black uppercase text-xs hover:bg-slate-300 transition-all tracking-widest' }, 'Zavřít detail')
                        )
                    )
                ),
                e('div', { className: 'fixed bottom-8 right-8 z-40' },
                    e('a', { href: formUrl, target: '_blank', className: 'bg-emerald-500 text-white w-14 h-14 md:w-auto md:px-6 rounded-full shadow-2xl hover:bg-emerald-600 transition-all flex items-center justify-center gap-3 group' },
                        e(Icon, { name: 'pen-line', className: 'w-6 h-6' }),
                        e('span', { className: 'hidden md:block font-black uppercase text-xs tracking-widest' }, 'Zápis seminářů')
                    )
                ),
                e('footer', { className: 'max-w-6xl mx-auto px-4 py-12 border-t text-center' },
                    e('p', { className: 'text-slate-400 text-xs font-black uppercase tracking-[0.3em] mb-4' }, 'Gymnázium Slaný 2026/27')
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
