<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Seminářů 2026/27 | Gymnázium Slaný</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SEMINARS_DATA = [
            { "id": "B2F", "code": "B2F", "title": "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň B2", "subject": "angličtina", "group": "cizí jazyky", "years": ["3. ročník"], "isCertificate": true, "target": "Studenti, kteří chtějí získat mezinárodně uznávaný certifikát B2 First.", "warning": "Vstupní test se skládá na konci 2. ročníku.", "annotation": "Chcete získat v pracovním i studijním životě využitelný a mezinárodně uznávaný jazykový certifikát na úrovni B2? Vítanou pomocí vám tak může být výběrový seminář zaměřený na efektivní a intenzivní přípravu k jeho složení. V průběhu roku budete rozvíjet a prohlubovat všechny testované dovednosti (listening, writing, speaking, use of English). Podmínkou přijetí je úspěšné složení vstupního testu, který zaručuje, že tempo výuky bude odpovídat vašim středně pokročilým znalostem. Seminář vyžaduje vysokou míru samostatnosti a aktivní přístup k přípravě." },
            { "id": "CAE", "code": "CAE", "title": "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň C1", "subject": "angličtina", "group": "cizí jazyky", "years": ["4. ročník"], "isCertificate": true, "target": "Studenti cílí na prestižní mezinárodní certifikát Cambridge C1 Advanced.", "warning": "", "annotation": "Cítíte, že máte na víc? Chtěli byste studovat v zahraničí nebo se angličtině plánujete věnovat v rámci svých studií na VŠ? Pak neváhejte a zapište si přípravný seminář ke složení mezinárodní jazykové zkoušky na úrovni C1. V průběhu roku budete systematicky rozvíjet a prohlubovat všechny testované dovednosti (listening, writing, speaking, use of English), a to s využitím široké škály témat odpovídajících pokročilé jazykové úrovni. Seminář vyžaduje vysokou míru samostatnosti a aktivní přístup k přípravě." },
            { "id": "KAJ", "code": "KAJ", "title": "Konverzační seminář z anglického jazyka", "subject": "angličtina", "group": "cizí jazyky", "years": ["4. ročník"], "isCertificate": false, "target": "Studenti, kteří z angličtiny nematurují, ale chtějí si udržet plynulost.", "warning": "", "annotation": "Mluviti stříbro, mlčeti…tu rozhodně nebudete! Pokud neskládáte profilovou maturitní zkoušku z angličtiny, ale zároveň chcete dále rozvíjet své dovednosti a kompetence v oblasti mluveného jazyka, je tento seminář právě pro vás. Pokrývá obecná témata a aktuální dění ve světě, a to formou debat, individuálních/skupinových ústních prezentací, krátkodobých projektů apod." },
            { "id": "CM", "code": "CM", "title": "Cvičení z matematiky", "subject": "matematika", "group": "přírodní vědy", "years": ["4. ročník"], "isCertificate": false, "target": "Příprava na maturitní didaktický test z matematiky.", "warning": "", "annotation": "Máte obavy z maturitního testu z matematiky? Tento seminář je navržen jako intenzivní a systematický průvodce, který vás provede všemi devíti klíčovými tématy nezbytnými pro úspěšné složení státní maturity. Cílem není jen teorii znát, ale umět ji v časovém limitu testu správně použít." },
            { "id": "KNJ", "code": "KNJ", "title": "Konverzace v německém jazyce", "subject": "němčina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Studenti, kteří chtějí maturovat z němčiny nebo se v ní zdokonalit.", "warning": "Lze zapsat pro 3. i 4. ročník.", "annotation": "Seminář je zaměřen na přípravu k profilové/státní zkoušce z německého jazyka. Příprava se zaměřuje na složení ústní zkoušky (konverzační témata profilové části) a složení státní zkoušky formou DT (poslech, čtení a gramatika)." },
            { "id": "ZD", "code": "ZD", "title": "Příprava na mezinárodní zkoušku Zertifikat Deutsch B1", "subject": "němčina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": true, "target": "Získání mezinárodní zkoušky na úrovni B1.", "warning": "Složení zkoušky na konci kurzu je dobrovolné.", "annotation": "Seminář zaměřený na všechny čtyři pilíře jazyka – poslech, čtení, psaní i mluvený projev. Pokud budete chtít, tak vás systematicky připraví na složení mezinárodní zkoušky Zertifikat Deutsch na úrovni B1." },
            { "id": "KRP", "code": "KRP", "title": "Kreativní psaní", "subject": "český jazyk a literatura", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o žurnalistiku, humanitní obory a stylistiku.", "warning": "", "annotation": "Tento seminář vás provede technikami tvůrčího psaní a naučí vás pracovat s jazykem jako s nástrojem. Nejde jen o suché procvičování funkčních stylů – cílem je najít váš vlastní tvůrčí hlas." },
            { "id": "PAJ", "code": "PAJ", "title": "Přípravný seminář k maturitě z anglického jazyka", "subject": "angličtina", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Systematická příprava k profilové maturitě z AJ.", "warning": "Doporučujeme zapsat už ve 3. ročníku.", "annotation": "Seminář se zaměřuje na komplexní přípravu k ústní části profilové maturitní zkoušky z anglického jazyka. Prohlubují se znalosti a kompetence v rámci stanovených témat." },
            { "id": "SCB", "code": "SCB", "title": "Seminář a cvičení z biologie", "subject": "biologie", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Uchazeči o medicínu, farmacii a přírodovědné obory.", "warning": "Dvouletý kurz rozdělený na teoretickou a opakovací část.", "annotation": "Seminář rozšiřuje standardní výuku biologie o hlubší vhled do biologie buněk, genetiky a mikrobiologie. Součástí je simulované zkoušení „nanečisto“." },
            { "id": "SCF", "code": "SCF", "title": "Seminář a cvičení z fyziky", "subject": "fyzika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o technické obory a medicínu.", "warning": "", "annotation": "Seminář zaměřený na praktické pochopení fyzikálních zákonů prostřednictvím experimentů. Ve 4. ročníku je cílem propojit znalosti do uceleného systému." },
            { "id": "SCH", "code": "SCH", "title": "Seminář a cvičení z chemie", "subject": "chemie", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí lékaři, lékárníci a chemici.", "warning": "", "annotation": "Ve 3. ročníku se zaměříme na anorganickou a analytickou chemii. Maturitní ročník je věnován organické chemii a biochemii nezbytné pro studium medicíny." },
            { "id": "SCI", "code": "SCI", "title": "Seminář a cvičení z informatiky", "subject": "informatika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o IT, vývoj webu a analýzu dat.", "warning": "", "annotation": "Chcete se posunout od pouhého užívání technologií k jejich tvorbě? Tento seminář otevírá dveře do světa vývoje webových aplikací, Pythonu a kyberbezpečnosti." },
            { "id": "SCM", "code": "SCM", "title": "Seminář a cvičení z matematiky", "subject": "matematika", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Studenti technických a ekonomických směrů.", "warning": "", "annotation": "Seminář je postaven jako příprava na VŠ: probírají se limity funkce, derivace a integrály. Cílem je pomoci studentům zvládnout první ročník VŠ." },
            { "id": "PSY", "code": "PSY", "title": "Psychologie", "subject": "psychologie", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o studium psychologie, pedagogiky a medicíny.", "warning": "", "annotation": "Seminář nabízející hlubší vhled do tajů lidské psychiky, od základních procesů vnímání až po složité otázky osobnosti a sociálních vztahů." },
            { "id": "SVS", "code": "SVS", "title": "Společenskovědní seminář", "subject": "občanská nauka", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Budoucí studenti práv, politologie a žurnalistiky.", "warning": "", "annotation": "Seminář nabízí prostor pro hlubokou sondu do témat jako světová náboženství, česká filozofie i praktické základy práva a politologie." },
            { "id": "SVV", "code": "SVV", "title": "Seminář z výtvarné výchovy", "subject": "výtvarná vychova", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Uchazeči o architekturu a dějiny umění.", "warning": "", "annotation": "Teoreticko-praktický seminář, který vás provede klíčovými uměleckými směry a životními osudy významných tvůrců." },
            { "id": "SCZ", "code": "SCZ", "title": "Seminář a cvičení ze zeměpisu", "subject": "zeměpis", "group": "přírodní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o geografii a mezinárodní vztahy.", "warning": "", "annotation": "Ve 3. ročníku je seminář zaměřen na fenomén cestovního ruchu. Ve 4. ročníku se stává intenzivní přípravou na maturitní zkoušku." },
            { "id": "KFJ", "code": "KFJ", "title": "Konverzace ve francouzském jazyce", "subject": "francouzština", "group": "cizí jazyky", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o francouzskou kulturu a mluvený projev.", "warning": "", "annotation": "Rozmluvte se francouzsky a objevte svět frankofonie. Zaměříme se na rozšiřování slovní zásoby a odbourání ostychu z mluvení." },
            { "id": "SCD", "code": "SCD", "title": "Seminář z dějepisu", "subject": "dějepis", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Zájemci o historii a mezinárodní vztahy.", "warning": "", "annotation": "Historie není jen soupis dat. Budeme objevovat „velké dějiny“ na konkrétních osudech a místech v našem okolí i ve světě 20. století." },
            { "id": "LS", "code": "LS", "title": "Literární seminář", "subject": "český jazyk a literatura", "group": "humanitní vědy", "years": ["3. ročník", "4. ročník"], "isCertificate": false, "target": "Všichni, kteří chtějí číst s porozuměním a nadhledem.", "warning": "", "annotation": "Seminář zaměřený na hlubší poznání literatury a interpretaci vybraných literárních děl jako přípravu k maturitě." }
        ];

        const App = () => {
            const [searchQuery, setSearchQuery] = useState("");
            const [yearFilter, setYearFilter] = useState("all");
            const [groupFilter, setGroupFilter] = useState("all");
            const [expandedId, setExpandedId] = useState(null);

            // UPRAVTE ODKAZ ZDE:
            const formUrl = "https://docs.google.com/forms/d/e/VAS_ODKAZ/viewform";

            const filteredSeminars = useMemo(() => {
                return SEMINARS_DATA.filter(s => {
                    const matchesSearch = s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.code.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesYear = yearFilter === "all" || s.years.some(y => y.includes(yearFilter));
                    const matchesGroup = groupFilter === "all" || s.group === groupFilter;
                    return matchesSearch && matchesYear && matchesGroup;
                });
            }, [searchQuery, yearFilter, groupFilter]);

            const subjects = [...new Set(filteredSeminars.map(s => s.subject))].sort();
            const groups = ["all", ...new Set(SEMINARS_DATA.map(s => s.group))];

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white border-b sticky top-0 z-30 shadow-sm px-4 py-6">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-2 rounded-xl text-white">
                                    <Icon name="graduation-cap" className="w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black uppercase tracking-tight">Katalog seminářů 26/27</h1>
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">Gymnázium Slaný</p>
                                </div>
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <input 
                                    className="flex-grow md:w-64 px-4 py-2 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-indigo-500/20 font-medium"
                                    placeholder="Hledat..."
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                                <select 
                                    className="px-4 py-2 bg-white border rounded-xl font-bold text-sm"
                                    value={yearFilter}
                                    onChange={e => setYearFilter(e.target.value)}
                                >
                                    <option value="all">Všechny ročníky</option>
                                    <option value="3.">3. ročník</option>
                                    <option value="4.">4. ročník</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        
                        <div className="bg-indigo-900 rounded-3xl p-8 mb-12 shadow-2xl relative overflow-hidden group">
                            <div className="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="text-center md:text-left text-white">
                                    <h3 className="text-2xl font-black mb-2 uppercase">Máš už vybráno?</h3>
                                    <p className="text-indigo-200">Přejdi k odeslání volby seminářů ve formuláři.</p>
                                </div>
                                <a href={formUrl} target="_blank" className="bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-5 rounded-2xl font-black shadow-lg transition-all hover:scale-105 flex items-center gap-3 uppercase tracking-wider">
                                    <span>CHCI SE ZAPSAT</span>
                                    <Icon name="chevron-right" className="w-6 h-6" />
                                </a>
                            </div>
                        </div>

                        <div className="flex overflow-x-auto gap-2 mb-10 pb-2 scrollbar-hide">
                            {groups.map(g => (
                                <button 
                                    key={g} 
                                    onClick={() => setGroupFilter(g)}
                                    className={`px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap border-2 ${groupFilter === g ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200'}`}
                                >
                                    {g === "all" ? "Všechny skupiny" : g.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {subjects.map(subject => (
                            <div key={subject} className="mb-12">
                                <h2 className="text-2xl font-black text-slate-800 mb-6 uppercase border-l-4 border-indigo-600 pl-4">{subject}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredSeminars.filter(s => s.subject === subject).map(s => {
                                        const isExpanded = expandedId === s.id;
                                        return (
                                            <div 
                                                key={s.id} 
                                                onClick={() => setExpandedId(isExpanded ? null : s.id)}
                                                className={`bg-white p-6 rounded-2xl border transition-all cursor-pointer flex flex-col ${isExpanded ? 'ring-2 ring-indigo-500 shadow-xl scale-[1.02]' : 'border-slate-200 shadow-sm hover:shadow-md'}`}
                                            >
                                                <div className="flex justify-between items-start mb-4">
                                                    <span className="bg-indigo-50 text-indigo-700 text-[10px] font-black px-2 py-1 rounded uppercase">{s.code}</span>
                                                    <div className="flex gap-1">
                                                        {s.years.map(y => <span key={y} className="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-1 rounded">{y}</span>)}
                                                    </div>
                                                </div>
                                                <h4 className="font-bold text-lg mb-3 leading-tight flex justify-between gap-2">
                                                    {s.title}
                                                    <Icon name={isExpanded ? "chevron-up" : "chevron-down"} className="w-5 h-5 text-slate-400 flex-shrink-0" />
                                                </h4>
                                                
                                                <p className={`text-slate-500 text-sm mb-4 transition-all ${isExpanded ? '' : 'line-clamp-3'}`}>
                                                    {s.annotation}
                                                </p>

                                                {isExpanded && (
                                                    <div className="mt-2 pt-4 border-t border-slate-100 space-y-3">
                                                        <div>
                                                            <span className="text-[10px] font-black uppercase text-indigo-500 block mb-1">Cílová skupina</span>
                                                            <p className="text-xs text-slate-700 font-medium">{s.target}</p>
                                                        </div>
                                                        {s.warning && (
                                                            <div className="bg-amber-50 p-3 rounded-lg border border-amber-100">
                                                                <span className="text-[10px] font-black uppercase text-amber-600 block mb-1">Důležité info</span>
                                                                <p className="text-xs text-amber-800 italic">{s.warning}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {!isExpanded && (
                                                    <div className="mt-auto pt-4 border-t border-slate-50 text-[10px] text-indigo-500 font-black uppercase tracking-wider flex items-center gap-1">
                                                        Více informací <Icon name="plus" className="w-3 h-3" />
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    <footer className="max-w-6xl mx-auto px-4 py-12 border-t text-center text-slate-400">
                        <p className="text-sm font-medium mb-4 uppercase tracking-widest">Gymnázium Slaný 2026/27</p>
                        <div className="text-slate-500 font-bold bg-white inline-block px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                            S pozdravem<br />
                            <span className="text-indigo-600">(virtuální) M. Valentová</span>
                        </div>
                    </footer>

                    <div className="fixed bottom-8 right-8 z-50">
                        <a href={formUrl} target="_blank" className="bg-emerald-500 text-white w-14 h-14 md:w-auto md:px-6 rounded-full shadow-2xl hover:bg-emerald-600 transition-all flex items-center justify-center gap-3 group">
                            <Icon name="pen-line" className="w-6 h-6" />
                            <span className="hidden md:block font-black uppercase text-xs tracking-widest">Zápis seminářů</span>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
