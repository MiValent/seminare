<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Seminářů 2026/27 | Gymnázium Slaný</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SEMINARS_DATA = [
            { 
                id: "B2F", 
                code: "B2F", 
                title: "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň B2", 
                subject: "Anglický jazyk", 
                group: "Jazyky", 
                years: ["3. ročník"], 
                isCertificate: true, 
                target: "Studenti, kteří chtějí získat mezinárodně uznávaný certifikát B2 First a potvrdit tak svou jazykovou samostatnost pro potřeby VŠ nebo zaměstnání.", 
                warning: "Vstupní test se skládá na konci 2. ročníku.", 
                annotation: "Chcete proměnit své znalosti angličtiny v oficiální certifikát, který vám otevře dveře na univerzity a k lepším pracovním nabídkám? Tento výběrový seminář je zaměřený na efektivní a intenzivní přípravu k mezinárodní zkoušce na úrovni B2. Rozvíjejí a prohlubují se všechny testované dovednosti (listening, writing, speaking, use of English). Podmínkou přijetí je úspěšné složení vstupního testu, který zaručuje, že tempo výuky bude odpovídat vašim pokročilým schopnostem. Seminář vyžaduje vysokou míru samostatnosti a aktivní přístup k přípravě." 
            },
            { 
                id: "CAE", 
                code: "CAE", 
                title: "Přípravný seminář k mezinárodní zkoušce z anglického jazyka - úroveň C1", 
                subject: "Anglický jazyk", 
                group: "Jazyky", 
                years: ["4. ročník"], 
                isCertificate: true, 
                target: "Studenti, kteří cílí na prestižní mezinárodní certifikát Cambridge C1 Advanced pro potřeby studia v zahraničí nebo na náročných oborech v ČR.", 
                annotation: "Posuňte svou angličtinu na úroveň rodilého mluvčího. Tento seminář je určen pro ty, kteří již mají velmi dobrou znalost angličtiny a chtějí proniknout do jemných nuancí jazyka, složitých gramatických struktur a bohaté slovní zásoby. Příprava směřuje ke složení mezinárodní zkoušky na úrovni C1, která je standardem pro studium na zahraničních univerzitách. Rozvíjejí a prohlubují se všechny testované dovednosti (listening, writing, speaking, use of English). Seminář je postaven na vysokém tempu, intelektuálně podnětných tématech a vyžaduje značnou míru samostatné práce." 
            },
            { 
                id: "SCD", 
                code: "SCD", 
                title: "Seminář z dějepisu", 
                subject: "Dějepis", 
                group: "Společenskovědní", 
                years: ["3. ročník", "4. ročník"], 
                target: "Zájemci o historii, politologii, pedagogiku a další humanitní obory, které vyžadují hlubší znalost historických souvislostí. Uchazeči o studium historie, archivnictví či mezinárodních vztahů.", 
                warning: "Seminář je koncipován jako dvouletý, lze si ho zapsat pro 3. i 4. ročník. Pozdější nástup do semináře (až ve 4. ročníku) je možný, ale ne úplně optimální.", 
                annotation: "Historie není jen soupis dat, ale klíč k pochopení naší současnosti. V prvním pololetí se zaměříme na regionální dějiny našeho kraje, kde budeme objevovat „velké dějiny“ na konkrétních osudech a místech v našem okolí. Druhé pololetí pak věnujeme vybraným kapitolám 20. století, které zásadně zformovaly dnešní svět. Seminář rozvíjí schopnost pracovat s historickými prameny a kriticky hodnotit různé interpretace minulosti. Ve 4. ročníku se seminář mění v intenzivní přípravu na maturitu a přijímací zkoušky na vysoké školy. Cílem je propojit znalosti od pravěku až po moderní dějiny do uceleného a logického celku. Budeme se věnovat systematizaci maturitních okruhů, procvičování historické terminologie a tréninku ústního projevu." 
            },
            { 
                id: "LS", 
                code: "LS", 
                title: "Literární seminář", 
                subject: "Český jazyk", 
                group: "Společenskovědní", 
                years: ["3. ročník", "4. ročník"], 
                target: "Studenti, kteří mají zájem o literaturu, tvůrčí psaní a humanitní obory. Zájemci o kvalitní přípravu na profilovou část maturity z českého jazyka.", 
                warning: "Seminář si lze zapsat pro 3. i 4. ročník.", 
                annotation: "Seminář je určen studentům, kteří mají zájem o hlubší poznání literatury a chtějí se lépe připravit na maturitní zkoušku z českého jazyka. Zaměříme se na četbu a interpretaci vybraných literárních děl, diskusi o tématech, postavách a literárních kontextech. Součástí je i nácvik analýzy uměleckého textu a rozvoj dovedností potřebných pro písemnou i ústní část maturitní zkoušky." 
            },
            { 
                id: "ZD", 
                code: "ZD", 
                title: "Příprava na zkoušku Zertifikat Deutsch B1", 
                subject: "Německý jazyk", 
                group: "Jazyky", 
                years: ["3. ročník", "4. ročník"], 
                isCertificate: true, 
                target: "Studenti, kteří uvažují o maturitě z němčiny, i ti, kteří si chtějí prostě jen prohloubit své komunikační dovednosti a získat v jazyce větší jistotu.", 
                warning: "Seminář si lze zapsat pro 3. i 4. ročník.",                 
                annotation: "Seminář zaměřený na všechny čtyři pilíře jazyka – poslech, čtení, psaní i mluvený projev. Pokud budete chtít, tak vás systematicky připraví na složení mezinárodní zkoušky Zertifikat Deutsch na úrovni B1. Účast v semináři je skvělým tréninkem i pro budoucí maturanty z německého jazyka, přičemž samotné složení mezinárodní zkoušky na konci kurzu je dobrovolné." 
            },
            { 
                id: "SVS", 
                code: "SVS", 
                title: "Společenskovědní seminář", 
                subject: "Základy společenských věd", 
                group: "Společenskovědní", 
                years: ["3. ročník", "4. ročník"], 
                target: "Budoucí studenti práv, politologie, mezinárodních vztahů, sociologie, filozofie či žurnalistiky.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Seminář nabízí prostor pro hlubokou sondu do témat, která v běžných hodinách občanského základu nestihneme probrat do detailu. Zaměříme se na fascinující svět světových náboženství, kořeny české filozofie i praktické základy práva a politologie. Ve 4. ročníku se seminář stává platformou pro systematizaci znalostí a přípravu na budoucí vysokoškolské studium." 
            },
            { 
                id: "PSY", 
                code: "PSY", 
                title: "Psychologie", 
                subject: "Základy společenských věd", 
                group: "Společenskovědní", 
                years: ["3. ročník", "4. ročník"], 
                target: "Zájemci o studium psychologie, medicíny i dalších humanitních a sociálních oborů.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Seminář nabízející hlubší vhled do tajů lidské psychiky, od základních procesů vnímání a myšlení až po složité otázky osobnosti a sociálních vztahů. Kromě teoretických základů vývojové psychologie a duševního zdraví se věnujeme i praktické aplikaci poznatků." 
            },
            { 
                id: "SCZ", 
                code: "SCZ", 
                title: "Seminář a cvičení ze zeměpisu", 
                subject: "Zeměpis", 
                group: "Přírodovědné", 
                years: ["3. ročník", "4. ročník"], 
                target: "Zájemci o studium geografie, mezinárodních vztahů či environmentálních věd.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Ve 3. ročníku je tento seminář zaměřen na fenomén cestovního ruchu. Regionální zeměpis budeme nahlížet právě optikou cestovního ruchu. Ve 4. ročníku se seminář stává intenzivní přípravou na maturitní zkoušku." 
            },
            { 
                id: "PAJ", 
                code: "PAJ", 
                title: "Přípravný seminář k maturitě z anglického jazyka", 
                subject: "Anglický jazyk", 
                group: "Jazyky", 
                years: ["3. ročník", "4. ročník"], 
                target: "Studenti, kteří chtějí maturovat z angličtiny a chtějí systematicky pracovat na své slovní zásobě.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Seminář se zaměřuje na komplexní přípravu k ústní části profilové maturitní zkoušky z anglického jazyka. Prohlubují se znalosti a dovednosti v rámci stanovených maturitních témat." 
            },
            { 
                id: "KAJ", 
                code: "KAJ", 
                title: "Konverzační seminář z anglického jazyka", 
                subject: "Anglický jazyk", 
                group: "Jazyky", 
                years: ["4. ročník"], 
                target: "Studenti, kteří z angličtiny nematurují, ale chtějí si udržet svou schopnost mluvit.", 
                warning: "Seminář si lze zapsat pouze pro 4. ročník.", 
                annotation: "Angličtina jako brána do světa, nikoliv jen jako maturitní předmět. Odkládáme stranou oficiální maturitní témata a zaměřujeme se na živý, moderní jazyk prostřednictvím debat o aktuálním dění." 
            },
            { 
                id: "KNJ", 
                code: "KNJ", 
                title: "Konverzace v německém jazyce", 
                subject: "Německý jazyk", 
                group: "Jazyky", 
                years: ["3. ročník", "4. ročník"], 
                target: "Studenti, kteří chtějí maturovat z němčiny nebo si zdokonalit dovednosti.", 
                warning: "Seminář si lze zapsat pro 3. i 4. ročník.", 
                annotation: "Seminář je zaměřen na přípravu k profilové/státní zkoušce z německého jazyka. Příprava se zaměřuje na složení ústní zkoušky a procvičování formou didaktických testů." 
            },
            { 
                id: "SCM", 
                code: "SCM", 
                title: "Seminář a cvičení z matematiky", 
                subject: "Matematika", 
                group: "Přírodovědné", 
                years: ["3. ročník", "4. ročník"], 
                target: "Budoucí studenti technických a ekonomických univerzit.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Tento seminář nabízí prostor pro témata, která běžná výuka nestíhá probrat do hloubky. Vstoupíme do světa komplexních čísel, kombinatoriky a matematické analýzy (limity, derivace, integrály)." 
            },
            { 
                id: "SCI", 
                code: "SCI", 
                title: "Seminář a cvičení z informatiky", 
                subject: "Informatika", 
                group: "Přírodovědné", 
                years: ["3. ročník", "4. ročník"], 
                target: "Zájemci o studium IT oborů, designu či digitálních médií.", 
                warning: "Seminář je koncipován jako dvouletý.", 
                annotation: "Tento seminář otevírá dveře do světa vývoje webových aplikací a pokročilé práce s daty. V maturitním ročníku se zaměříme na Python, algoritmizaci a kybernetickou bezpečnost." 
            }
        ];

        const App = () => {
          const [selectedSeminar, setSelectedSeminar] = useState(null);
          const [searchQuery, setSearchQuery] = useState("");
          const [yearFilter, setYearFilter] = useState("all");
          const [groupFilter, setGroupFilter] = useState("all");

          const groupedSeminars = useMemo(() => {
            const filtered = SEMINARS_DATA.filter(s => {
              const matchesSearch = s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.code.toLowerCase().includes(searchQuery.toLowerCase());
              const matchesYear = yearFilter === "all" || s.years.includes(yearFilter);
              const matchesGroup = groupFilter === "all" || s.group === groupFilter;
              return matchesSearch && matchesYear && matchesGroup;
            });

            const groups = filtered.reduce((acc, seminar) => {
              const subject = seminar.subject;
              if (!acc[subject]) acc[subject] = [];
              acc[subject].push(seminar);
              return acc;
            }, {});

            return Object.keys(groups).sort((a, b) => a.localeCompare(b, 'cs')).map(subject => ({
              subject,
              seminars: groups[subject].sort((a, b) => a.title.localeCompare(b.title, 'cs'))
            }));
          }, [searchQuery, yearFilter, groupFilter]);

          const filterGroups = ["all", ...new Set(SEMINARS_DATA.map(s => s.group))];

          return (
            <div className="min-h-screen text-slate-900 bg-slate-50">
              <header className="bg-white border-b sticky top-0 z-30 shadow-sm">
                <div className="max-w-6xl mx-auto px-4 py-6">
                  <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="flex items-center gap-4 text-center md:text-left">
                        <div className="hidden sm:flex w-12 h-12 bg-indigo-600 rounded-2xl items-center justify-center shadow-lg shadow-indigo-200">
                            <Icon name="graduation-cap" className="text-white w-7 h-7" />
                        </div>
                        <div>
                            <h1 className="text-2xl font-[900] tracking-tight text-slate-800 uppercase">Volba Seminářů 2026/27</h1>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-[0.2em]">Gymnázium Slaný</p>
                        </div>
                    </div>
                    
                    <div className="flex flex-wrap w-full md:w-auto gap-3">
                      <div className="relative flex-grow md:w-64">
                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" />
                        <input 
                          className="w-full pl-11 pr-4 py-3 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500/20 focus:bg-white transition-all font-semibold text-sm" 
                          placeholder="Hledat seminář..." 
                          value={searchQuery}
                          onChange={e => setSearchQuery(e.target.value)}
                        />
                      </div>
                      <select className="px-4 py-3 bg-white border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-indigo-500 transition-colors cursor-pointer" value={yearFilter} onChange={e => setYearFilter(e.target.value)}>
                        <option value="all">Všechny ročníky</option>
                        <option value="3. ročník">3. ročník</option>
                        <option value="4. ročník">4. ročník</option>
                      </select>
                    </div>
                  </div>

                  <div className="flex overflow-x-auto gap-2 mt-8 pb-2 scrollbar-hide">
                    {filterGroups.map(g => (
                        <button 
                            key={g} 
                            onClick={() => setGroupFilter(g)} 
                            className={`px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap border-2 ${groupFilter === g ? "bg-slate-900 text-white border-slate-900 shadow-lg shadow-slate-200" : "bg-white text-slate-500 border-slate-100 hover:border-slate-200"}`}
                        >
                            {g === "all" ? "Všechny skupiny" : g}
                        </button>
                    ))}
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-10 space-y-12">
                {groupedSeminars.length > 0 ? groupedSeminars.map(group => (
                  <section key={group.subject}>
                    <div className="flex items-center gap-4 mb-6">
                        <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">{group.subject}</h2>
                        <div className="h-px bg-slate-200 flex-grow"></div>
                        <span className="text-slate-400 font-bold text-xs">{group.seminars.length} {group.seminars.length === 1 ? 'seminář' : (group.seminars.length < 5 ? 'semináře' : 'seminářů')}</span>
                    </div>
                    <div className="subject-grid">
                        {group.seminars.map(s => (
                          <div 
                            key={s.id} 
                            onClick={() => setSelectedSeminar(s)} 
                            className="group bg-white p-6 rounded-[2rem] border border-slate-100 hover:shadow-xl hover:shadow-indigo-500/5 hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col h-full relative"
                          >
                            <div className="flex justify-between items-start mb-4">
                                <div className="flex flex-wrap gap-2">
                                    {s.isCertificate && (
                                        <span className="bg-amber-100 text-amber-600 font-black text-[10px] px-3 py-1 rounded-lg tracking-widest uppercase flex items-center gap-1">
                                            <Icon name="award" className="w-3 h-3" /> Certifikát
                                        </span>
                                    )}
                                </div>
                                <div className="flex flex-col gap-1 items-end ml-auto">
                                    {s.years.map(y => (
                                        <span key={y} className={`text-[9px] font-extrabold px-2 py-0.5 rounded-md uppercase tracking-wider border ${y.includes("3.") ? "bg-purple-50 text-purple-600 border-purple-100" : "bg-blue-50 text-blue-600 border-blue-100"}`}>
                                            {y}
                                        </span>
                                    ))}
                                </div>
                            </div>
                            
                            <h3 className="font-extrabold text-base text-slate-800 group-hover:text-indigo-600 transition-colors leading-tight mb-4 flex-grow">
                                {s.title} <span className="text-slate-400 font-semibold text-sm ml-1 uppercase tracking-wider">({s.code})</span>
                            </h3>
                            
                            <div className="pt-4 border-t border-slate-50 flex items-center gap-2">
                                <div className="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                                <span className="text-slate-400 font-bold text-[10px] uppercase tracking-wide">
                                    {s.group}
                                </span>
                            </div>
                          </div>
                        ))}
                    </div>
                  </section>
                )) : (
                  <div className="py-20 text-center">
                    <Icon name="search-x" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                    <p className="text-slate-500 font-bold">Nebyly nalezeny žádné semináře odpovídající vašim filtrům.</p>
                  </div>
                )}
              </main>

              {/* Detailní náhled */}
              {selectedSeminar && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setSelectedSeminar(null)}></div>
                  <div className="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="bg-slate-900 p-8 md:p-10 text-white relative shrink-0">
                        <button onClick={() => setSelectedSeminar(null)} className="absolute top-6 right-6 p-2 hover:bg-white/10 rounded-full transition-colors">
                            <Icon name="x" className="w-6 h-6" />
                        </button>
                        <div className="flex gap-3 mb-4 flex-wrap">
                            <span className="px-3 py-1 bg-indigo-500/20 border border-indigo-500/30 text-indigo-300 rounded-xl text-[10px] font-black uppercase tracking-widest">
                                {selectedSeminar.subject}
                            </span>
                            {selectedSeminar.isCertificate && (
                                <span className="px-3 py-1 bg-amber-500/20 border border-amber-500/30 text-amber-300 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-1">
                                    <Icon name="award" className="w-3 h-3" /> Certifikát
                                </span>
                            )}
                        </div>
                        <h2 className="text-2xl md:text-3xl font-[900] leading-tight tracking-tight">
                            {selectedSeminar.title} <span className="text-slate-500 font-semibold text-lg md:text-xl ml-1 uppercase">({selectedSeminar.code})</span>
                        </h2>
                    </div>

                    <div className="p-8 md:p-10 overflow-y-auto space-y-8">
                        {selectedSeminar.warning && (
                            <div className="bg-red-50 border-l-4 border-red-400 p-4 rounded-r-2xl text-red-900 text-sm font-semibold flex gap-3">
                                <Icon name="alert-circle" className="w-5 h-5 shrink-0 text-red-500" />
                                <span>{selectedSeminar.warning}</span>
                            </div>
                        )}
                        
                        <div className="grid gap-8">
                            <section>
                                <h4 className="flex items-center gap-2 text-indigo-600 font-black mb-3 uppercase tracking-widest text-[11px]">
                                    <Icon name="book-open" className="w-4 h-4" /> Anotace
                                </h4>
                                <p className="text-slate-700 leading-relaxed font-medium">
                                    {selectedSeminar.annotation}
                                </p>
                            </section>

                            <section className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                <div>
                                    <h4 className="text-slate-400 font-black mb-1 uppercase tracking-widest text-[10px]">Cílová skupina studentů</h4>
                                    <p className="text-slate-600 font-bold text-sm leading-relaxed">{selectedSeminar.target}</p>
                                </div>
                            </section>
                        </div>
                    </div>
                    <div className="p-6 bg-slate-50 border-t flex justify-end shrink-0">
                        <button 
                            onClick={() => setSelectedSeminar(null)} 
                            className="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-[11px] uppercase tracking-[0.2em] shadow-lg hover:bg-indigo-600 transition-all"
                        >
                            Zavřít detail
                        </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
