<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Seminářů 2026/27 | Gymnázium Slaný</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- KOMPLETNÍ DATA SEMINÁŘŮ (převzato z index-3.html) ---
        const seminareData = [
            { id: 1, code: "B2F", group: "Cizí jazyky", title: "Příprava k B2 First", annotation: "Příprava na mezinárodní zkoušku Cambridge English: B2 First. Rozvoj všech jazykových dovedností – poslech, čtení, psaní a mluvený projev.", target: "3. a 4. ročník", warning: "Otevření semináře je podmíněno dostatečným počtem zájemců." },
            { id: 2, code: "CAE", group: "Cizí jazyky", title: "Příprava k C1 Advanced", annotation: "Intenzivní příprava na zkoušku Cambridge English: C1 Advanced pro pokročilé studenty.", target: "3. a 4. ročník" },
            { id: 3, code: "KAJ", group: "Cizí jazyky", title: "Konverzace v AJ", annotation: "Zaměřeno na plynulost mluveného projevu, rozšiřování slovní zásoby a schopnost reagovat v běžných situacích.", target: "4. ročník" },
            { id: 4, code: "PAJ", group: "Cizí jazyky", title: "Praktická angličtina", annotation: "Praktické využití jazyka, upevnění gramatických struktur a slovní zásoby pro každodenní život.", target: "3. ročník" },
            { id: 5, code: "MAT", group: "Matematika", title: "Matematický seminář", annotation: "Příprava k maturitní zkoušce a k přijímacím zkouškám na VŠ technického a ekonomického směru.", target: "4. ročník" },
            { id: 6, code: "M-S", group: "Matematika", title: "Matematika - cvičení", annotation: "Prohlubování a procvičování učiva matematiky střední školy.", target: "3. ročník" },
            { id: 7, code: "DES", group: "Matematika", title: "Deskrpitiivní geometrie", annotation: "Základy zobrazovacích metod, vhodné pro budoucí studenty architektury a stavebních oborů.", target: "4. ročník" },
            { id: 8, code: "FYZ", group: "Přírodní vědy", title: "Fyzikální seminář", annotation: "Příprava k maturitě z fyziky a k přijímacím zkouškám na VŠ.", target: "4. ročník" },
            { id: 9, code: "CHE", group: "Přírodní vědy", title: "Chemický seminář", annotation: "Prohloubení znalostí z chemie, příprava na medicínu a přírodovědné obory.", target: "4. ročník" },
            { id: 10, code: "BIO", group: "Přírodní vědy", title: "Biologický seminář", annotation: "Rozšíření středoškolského učiva biologie, vhodné pro zájemce o medicínu a biologii.", target: "4. ročník" },
            { id: 11, code: "ZEM", group: "Přírodní vědy", title: "Zeměpisný seminář", annotation: "Regionální geografie světa a ČR v souvislostech.", target: "4. ročník" },
            { id: 12, code: "DEJ", group: "Společenské vědy", title: "Dějepisný seminář", annotation: "Moderní dějiny a příprava k maturitě z dějepisu.", target: "4. ročník" },
            { id: 13, code: "ZSV", group: "Společenské vědy", title: "Seminář ze ZSV", annotation: "Politologie, právo, sociologie a ekonomie pro maturanty.", target: "4. ročník" },
            { id: 14, code: "PSY", group: "Společenské vědy", title: "Základy psychologie", annotation: "Úvod do studia psychologie a základy práce s lidmi.", target: "3. ročník" },
            { id: 15, code: "EST", group: "Umění", title: "Estetická výchova", annotation: "Seminář zaměřený na dějiny umění a estetické vnímání světa.", target: "3. a 4. ročník" },
            { id: 16, code: "IVT", group: "Informatika", title: "Informatika a programování", annotation: "Základy algoritmizace a programování.", target: "3. a 4. ročník" }
        ];

        const App = () => {
            const [selectedSeminar, setSelectedSeminar] = useState(null);
            const [filter, setFilter] = useState('Vše');
            const formUrl = "https://forms.gle/YxnYDD6ataCjBwve6";

            const categories = ['Vše', ...new Set(seminareData.map(s => s.group))];
            
            const filteredSeminare = useMemo(() => 
                filter === 'Vše' ? seminareData : seminareData.filter(s => s.group === filter),
                [filter, filter]
            );

            return (
                <div className="min-h-screen">
                    <header className="bg-white border-b sticky top-0 z-30">
                        <div className="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase text-slate-900">Katalog Seminářů</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Gymnázium Slaný | 2026/27</p>
                            </div>
                            <a href={formUrl} target="_blank" className="hidden md:flex bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-indigo-700 transition-all items-center gap-2 text-decoration-none">
                                Chci se zapsat <Icon name="chevron-right" className="w-4 h-4" />
                            </a>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto px-4 py-8 text-center">
                        <div className="flex gap-2 overflow-x-auto pb-4 scrollbar-hide justify-center">
                            {categories.map(cat => (
                                <button key={cat} onClick={() => setFilter(cat)}
                                    className={`px-5 py-2.5 rounded-full text-xs font-black uppercase tracking-widest transition-all whitespace-nowrap ${filter === cat ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 hover:bg-slate-100'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
                            {filteredSeminare.map(s => (
                                <div key={s.id} onClick={() => setSelectedSeminar(s)} className="bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl transition-all cursor-pointer group border border-slate-100 flex flex-col h-full text-left">
                                    <div className="flex justify-between items-start mb-6">
                                        <span className="bg-slate-100 text-slate-900 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">{s.code}</span>
                                        <Icon name="arrow-up-right" className="w-5 h-5 text-slate-300 group-hover:text-indigo-600 transition-colors" />
                                    </div>
                                    <h3 className="text-xl font-black leading-tight mb-4 uppercase tracking-tight text-slate-900 group-hover:text-indigo-600 transition-colors">{s.title}</h3>
                                    <p className="text-slate-500 text-sm font-medium line-clamp-3 mb-6 flex-grow">{s.annotation}</p>
                                    <div className="pt-6 border-t border-slate-50 mt-auto">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{s.target}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedSeminar && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" onClick={() => setSelectedSeminar(null)}>
                            <div className="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setSelectedSeminar(null)} className="absolute top-6 right-6 p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                                    <Icon name="x" className="w-5 h-5" />
                                </button>
                                
                                <div className="p-8 md:p-12 text-left">
                                    <div className="flex items-center gap-3 mb-6 text-left">
                                        <span className="bg-indigo-600 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest">{selectedSeminar.code}</span>
                                        <span className="text-slate-400 font-bold uppercase text-xs tracking-widest">{selectedSeminar.group}</span>
                                    </div>
                                    
                                    <h2 className="text-3xl font-[900] leading-tight text-slate-900 mb-6 uppercase tracking-tight text-left">{selectedSeminar.title}</h2>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <h5 className="text-[10px] font-black uppercase text-indigo-500 mb-2 tracking-widest text-left">Anotace</h5>
                                            <p className="text-slate-600 leading-relaxed font-medium text-left">{selectedSeminar.annotation}</p>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-slate-100">
                                            <div>
                                                <h5 className="text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest text-left">Pro koho je určen</h5>
                                                <p className="text-sm font-bold text-slate-700 text-left">{selectedSeminar.target}</p>
                                            </div>

                                            {/* Modrý box pro Angličtinu */}
                                            {selectedSeminar.code && ["B2F", "CAE", "KAJ", "PAJ"].includes(selectedSeminar.code) && (
                                                <div className="md:col-span-2 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 flex gap-3 items-start mt-2">
                                                    <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                                        <Icon name="info" className="w-4 h-4" />
                                                    </div>
                                                    <div>
                                                        <h5 className="text-[10px] font-black uppercase text-indigo-600 mb-1 tracking-widest text-left">Pravidlo zápisu</h5>
                                                        <p className="text-sm font-bold text-indigo-900 leading-tight text-left">
                                                            V každém ročníku si lze zapsat pouze jeden seminář z anglického jazyka.
                                                        </p>
                                                    </div>
                                                </div>
                                            )}

                                            {selectedSeminar.warning && (
                                                <div className="bg-amber-50 p-4 rounded-2xl border border-amber-100 md:col-span-2 text-left mt-2">
                                                    <h5 className="text-[10px] font-black uppercase text-amber-600 mb-1 tracking-widest flex items-center gap-2">
                                                        <Icon name="alert-circle" className="w-3 h-3" /> Poznámka
                                                    </h5>
                                                    <p className="text-sm italic text-amber-900 leading-tight text-left">{selectedSeminar.warning}</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-6 flex justify-center items-center border-t">
                                    <button onClick={() => setSelectedSeminar(null)} className="bg-slate-200 text-slate-600 px-8 py-3 rounded-xl font-black uppercase text-xs hover:bg-slate-300 transition-all tracking-widest">
                                        Zavřít detail
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-8 right-8 z-40">
                        <a href={formUrl} target="_blank" className="bg-emerald-500 text-white w-14 h-14 md:w-auto md:px-6 rounded-full shadow-2xl hover:bg-emerald-600 transition-all flex items-center justify-center gap-3 group text-decoration-none">
                            <Icon name="pen-line" className="w-6 h-6" />
                            <span className="hidden md:block font-black uppercase text-xs tracking-widest">Zápis seminářů</span>
                        </a>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
