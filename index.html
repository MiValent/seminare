                            <div className="flex gap-2">
                                {selectedSeminar.years.map(year => (
                                    <button key={year} onClick={() => setActiveYearTab(year)} className={`px-4 py-2 rounded-xl text-xs font-black transition-all border-2 ${activeYearTab === year ? "bg-white text-slate-900 border-white" : "text-white/60 border-white/20 hover:border-white/40"}`}>{year}</button>
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="p-8 overflow-y-auto max-h-[50vh] space-y-8">
                        {selectedSeminar.details[activeYearTab]?.info && (
                            <div className="bg-amber-50 border border-amber-100 p-4 rounded-2xl text-amber-900 text-sm font-bold italic flex gap-3"><Icon name="info" className="w-5 h-5 shrink-0 text-amber-500" /> {selectedSeminar.details[activeYearTab].info}</div>
                        )}
                        <section>
                            <h4 className="flex items-center gap-2 text-indigo-600 font-black mb-3 uppercase tracking-widest text-[10px]"><Icon name="book-open" className="w-4 h-4" /> Anotace</h4>
                            <p className="text-slate-700 leading-relaxed font-medium">{selectedSeminar.details[activeYearTab]?.annotation}</p>
                        </section>
                        <section>
                            <h4 className="flex items-center gap-2 text-indigo-600 font-black mb-3 uppercase tracking-widest text-[10px]">💡 Očekávaný obsah</h4>
                            <p className="text-slate-700 leading-relaxed font-medium">{selectedSeminar.details[activeYearTab]?.expectations}</p>
                        </section>
                        <section className="pt-6 border-t">
                            <h4 className="flex items-center gap-2 text-slate-400 font-black mb-2 uppercase tracking-widest text-[10px]"><Icon name="users" className="w-4 h-4" /> Cílová skupina</h4>
                            <p className="text-slate-500 font-bold italic text-sm">{selectedSeminar.details[activeYearTab]?.target}</p>
                        </section>
                    </div>
                    <div className="p-6 bg-slate-50 border-t flex justify-end">
                      <button onClick={() => setSelectedSeminar(null)} className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">Zavřít</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
