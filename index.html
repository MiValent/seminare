<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Seminářů 2025/26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">
    <div id="root"></div>

    <!-- React a Lucide Icons z CDN pro snadné spuštění kdekoli -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Ikony definované jako SVG komponenty pro nezávislost
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const SEMINARS_DATA = [
          {
            id: "B2F",
            code: "B2F",
            title: "Přípravný seminář k mezinárodní zkoušce z AJ - úroveň B2",
            years: ["3. ročník"],
            tags: ["certifikát"],
            categories: ["Cizí jazyky"],
            details: {
              "3. ročník": {
                info: "DŮLEŽITÉ: V každém ročníku může být zapsaný pouze JEDEN seminář z anglického jazyka. Vstupní test se skládá na konci 2. ročníku.",
                annotation: "Chcete proměnit své znalosti angličtiny v oficiální certifikát? Tento výběrový seminář je zaměřen na intenzivní přípravu k mezinárodní zkoušce na úrovni B2.",
                expectations: "Komplexní nácvik: procvičování poslechu, psaní, mluveného projevu a jazykových struktur (Use of English).",
                target: "Studenti s pokročilou znalostí angličtiny, kteří chtějí získat certifikát B2."
              }
            }
          },
          {
            id: "PAJ3",
            code: "PAJ3",
            title: "Přípravný seminář k maturitě z AJ",
            years: ["3. ročník", "4. ročník"],
            isTwoYear: true,
            categories: ["Cizí jazyky"],
            details: {
              "3. ročník": {
                info: "DŮLEŽITÉ: V každém ročníku může být zapsaný pouze JEDEN seminář z anglického jazyka.",
                annotation: "Seminář se zaměřuje na komplexní přípravu k ústní části profilové maturitní zkoušky z anglického jazyka.",
                expectations: "Prohlubování znalostí, dovedností a kompetencí v rámci stanovených maturitních témat.",
                target: "Budoucí maturanti, kteří si chtějí upevnit své znalosti."
              },
              "4. ročník": {
                info: "DŮLEŽITÉ: V každém ročníku může být zapsaný pouze JEDEN seminář z anglického jazyka.",
                annotation: "V závěrečném ročníku graduje příprava k maturitě.",
                expectations: "Intenzivní nácvik maturitních okruhů, simulace ústních zkoušek.",
                target: "Maturanti z AJ."
              }
            }
          },
          {
            id: "ZD",
            code: "ZD",
            title: "Příprava na zkoušku Zertifikat Deutsch B1",
            years: ["3. ročník", "4. ročník"],
            tags: ["certifikát"],
            singleDetail: true,
            categories: ["Cizí jazyky"],
            details: {
              "Společné": {
                annotation: "Systematická příprava k získání certifikátu Goethe-Zertifikat B1. Seminář je určen pro 3. i 4. ročník se stejným obsahem.",
                expectations: "Nácvik všech čtyř dovedností: čtení, poslech, psaní a mluvení podle formátu zkoušky.",
                target: "Studenti NJ, kteří chtějí získat mezinárodně uznávaný doklad o své jazykové úrovni."
              }
            }
          },
          {
            id: "SCB",
            code: "SCB",
            title: "Seminář a cvičení z biologie",
            years: ["3. ročník", "4. ročník"],
            isTwoYear: true,
            categories: ["Přírodní vědy"],
            details: { "3. ročník": { annotation: "Biologie v souvislostech.", expectations: "Laboratorní cvičení.", target: "Budoucí lékaři." } }
          },
          {
            id: "SVS",
            code: "SVS",
            title: "Společenskovědní seminář",
            years: ["3. ročník", "4. ročník"],
            isTwoYear: true,
            categories: ["Humanitní obory"],
            details: { "3. ročník": { annotation: "Filozofie a sociologie v praxi.", expectations: "Analýzy, diskuse.", target: "Zájemci o práva." } }
          }
          // Zde můžete dopsat zbývající data ze seznamu...
        ];

        const App = () => {
          const [selectedSeminar, setSelectedSeminar] = useState(null);
          const [activeYearTab, setActiveYearTab] = useState(null);
          const [searchQuery, setSearchQuery] = useState("");
          const [yearFilter, setYearFilter] = useState("all");
          const [categoryFilter, setCategoryFilter] = useState("all");

          const filteredSeminars = useMemo(() => {
            return SEMINARS_DATA.filter(s => {
              const matchesSearch = s.title.toLowerCase().includes(searchQuery.toLowerCase()) || s.code.toLowerCase().includes(searchQuery.toLowerCase());
              const matchesYear = yearFilter === "all" || s.years.includes(yearFilter);
              const matchesCat = categoryFilter === "all" || s.categories.includes(categoryFilter);
              return matchesSearch && matchesYear && matchesCat;
            }).sort((a, b) => a.title.localeCompare(b.title, 'cs'));
          }, [searchQuery, yearFilter, categoryFilter]);

          const openSeminar = (s) => {
            setSelectedSeminar(s);
            setActiveYearTab(s.singleDetail ? "Společné" : (yearFilter !== "all" && s.details[yearFilter] ? yearFilter : Object.keys(s.details)[0]));
          };

          return (
            <div className="min-h-screen">
              <header className="bg-white border-b sticky top-0 z-30 shadow-sm p-4">
                <div className="max-w-6xl mx-auto">
                  <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                    <h1 className="text-xl font-black flex items-center gap-2">
                       <Icon name="graduation-cap" className="text-indigo-600" /> KATALOG SEMINÁŘŮ
                    </h1>
                    <div className="flex w-full md:w-auto gap-2">
                      <input 
                        className="flex-grow p-2 bg-slate-100 rounded-lg outline-none focus:ring-2 ring-indigo-500" 
                        placeholder="Hledat..." 
                        value={searchQuery}
                        onChange={e => setSearchQuery(e.target.value)}
                      />
                      <select className="p-2 border rounded-lg font-bold" value={yearFilter} onChange={e => setYearFilter(e.target.value)}>
                        <option value="all">Všechny ročníky</option>
                        <option value="3. ročník">3. ročník</option>
                        <option value="4. ročník">4. ročník</option>
                      </select>
                    </div>
                  </div>
                </div>
              </header>

              <main className="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                {filteredSeminars.map(s => (
                  <div key={s.id} onClick={() => openSeminar(s)} className="bg-white p-6 rounded-3xl border border-slate-200 hover:shadow-xl transition-all cursor-pointer group">
                    <div className="flex flex-wrap gap-2 mb-4">
                       {s.years.map(y => <span key={y} className="text-[10px] font-black px-2 py-1 bg-slate-100 rounded uppercase">{y}</span>)}
                       {s.isTwoYear && <span className="text-[10px] font-black px-2 py-1 bg-emerald-100 text-emerald-700 rounded uppercase">2letý</span>}
                    </div>
                    <h3 className="font-black text-lg group-hover:text-indigo-600 transition-colors">{s.title}</h3>
                    <p className="text-slate-400 font-bold text-xs mt-2">{s.code}</p>
                  </div>
                ))}
              </main>

              {selectedSeminar && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={() => setSelectedSeminar(null)}></div>
                  <div className="bg-white w-full max-w-xl rounded-[2rem] relative z-10 overflow-hidden flex flex-col">
                    <div className="bg-slate-900 p-8 text-white">
                      <div className="flex gap-2 mb-2">
                        <span className="text-[10px] font-black bg-white/10 px-2 py-1 rounded uppercase tracking-widest">{selectedSeminar.code}</span>
                        {selectedSeminar.tags?.includes("certifikát") && <span className="text-[10px] font-black bg-amber-500 px-2 py-1 rounded uppercase tracking-widest text-white">Certifikát</span>}
                      </div>
                      <h2 className="text-2xl font-black">{selectedSeminar.title}</h2>
                    </div>
                    <div className="p-8 space-y-6">
                      <p className="text-slate-700 leading-relaxed font-medium">{selectedSeminar.details[activeYearTab]?.annotation}</p>
                      <div className="bg-indigo-50 p-4 rounded-xl">
                        <h4 className="text-[10px] font-black text-indigo-600 uppercase mb-1">Co vás čeká:</h4>
                        <p className="text-sm font-medium">{selectedSeminar.details[activeYearTab]?.expectations}</p>
                      </div>
                    </div>
                    <div className="p-6 border-t flex justify-end">
                      <button onClick={() => setSelectedSeminar(null)} className="bg-slate-900 text-white px-6 py-2 rounded-xl font-black text-sm uppercase">Zavřít</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
